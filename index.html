<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilson Pinto Imóveis — Anúncios</title>
<meta name="description" content="Hub de anúncios e landing pages da Wilson Pinto Imóveis.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EF;
    --ink:#241F1A;
    --ink-soft:#5C5449;
    --brick:#A3512C;
    --green-deep:#3A4A34;
    --line:rgba(36,31,26,0.14);
    --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Public Sans', sans-serif; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2{font-family:'Fraunces', serif; font-weight:600; color:var(--green-deep); letter-spacing:-0.01em;}
  a{color:inherit;}
  .wrap{max-width:820px; margin:0 auto; padding:64px 24px;}
  header{margin-bottom:48px;}
  .eyebrow{font-size:0.72rem; color:var(--brick); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:12px;}
  h1{font-size:2rem; max-width:20ch;}
  header p{margin-top:14px; color:var(--ink-soft); max-width:52ch;}
  .list{display:flex; flex-direction:column; gap:14px;}
  .card{
    display:block; background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:22px 24px; text-decoration:none; transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-2px); box-shadow:0 8px 24px rgba(36,31,26,0.08);}
  .card h2{font-size:1.1rem;}
  .card p{margin-top:6px; color:var(--ink-soft); font-size:0.9rem;}
  .placeholder{
    border:1px dashed var(--line); border-radius:var(--radius);
    padding:26px 24px; color:var(--ink-soft); font-size:0.92rem;
  }
  footer{margin-top:56px; font-size:0.78rem; color:var(--ink-soft); border-top:1px solid var(--line); padding-top:20px;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="eyebrow">Wilson Pinto Imóveis</span>
      <h1>Anúncios e landing pages</h1>
      <p>Painel com os anúncios individuais publicados para a Wilson Pinto Imóveis. Cada imóvel ou campanha tem sua própria página.</p>
    </header>
    <div class="list">
      <div class="placeholder">Nenhum anúncio publicado ainda. Os links para cada landing page individual aparecerão aqui.</div>
    </div>
    <footer>Wilson Pinto Imóveis</footer>
  </div>
</body>
</html>
